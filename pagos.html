         <ul class="nav-links">

    <form action="guardar_pago.php" method="POST">

        <div class="grid">

            <!-- ESTUDIANTE -->
            <div class="input-group">

                <label>Seleccione Estudiante</label>

                <select name="estudiante_id" id="estudiante" required>

                    <option value="">Buscar estudiante...</option>

                    <?php

                    include("conexion.php");

                    $consulta = mysqli_query($conexion, "
                        SELECT id, nombre, cedula
                        FROM estudiantes
                        ORDER BY nombre ASC
                    ");

                    while ($fila = mysqli_fetch_assoc($consulta)) {

                        ?>

                        <option value="<?php echo $fila['id']; ?>">

                            <?php echo htmlspecialchars($fila['nombre']); ?>
                            -
                            <?php echo htmlspecialchars($fila['cedula']); ?>

                        </option>

                        <?php
                    }

                    ?>

                </select>

            </div>

            <!-- LICENCIA -->
            <div class="input-group">

                <label>Tipo de Licencia</label>

                <select 
                    name="licencia_id"
                    id="licencia"
                    onchange="calcularPago()"
                    required
                >

                    <option value="">Seleccione licencia</option>

                    <?php

                    $licencias = mysqli_query($conexion, "
                        SELECT id, tipo, valor
                        FROM licencias
                    ");

                    while ($lic = mysqli_fetch_assoc($licencias)) {

                        ?>

                        <option 
                            value="<?php echo $lic['id']; ?>"
                            data-valor="<?php echo $lic['valor']; ?>"
                        >

                            Licencia <?php echo htmlspecialchars($lic['tipo']); ?>
                            -
                            $<?php echo number_format($lic['valor'],2); ?>

                        </option>

                        <?php
                    }

                    ?>

                </select>

            </div>

        </div>

        <!-- DATOS -->
        <div class="grid">

            <div class="input-group">

                <label>Matrícula</label>

                <input 
                    type="number"
                    id="matricula"
                    value="50"
                    onchange="calcularPago()"
                >

            </div>

            <div class="input-group">

                <label>Descuento (%)</label>

                <input 
                    type="number"
                    id="descuento"
                    value="0"
                    onchange="calcularPago()"
                >

            </div>

        </div>

        <!-- RESULTADOS -->
        <div class="resultados">

            <h2>Resumen de Pago</h2>

            <div class="resultado-item">

                $<span id="valorCurso">0.00</span>
            </div>

            <div class="resultado-item">
                Matrícula:
                $<span id="valorMatricula">50.00</span>
            </div>

            <div class="resultado-item">
                Descuento:
                $<span id="valorDescuento">0.00</span>
            </div>

            <hr style="margin:15px 0;">

            <div class="resultado-item">
                <strong>
                    Total a Pagar:
                    $<span id="total">0.00</span>
                </strong>
            </div>

        </div>

        <br>

        <input 
            type="hidden"
            name="total_pago"
            id="totalInput"
        >

        <button type="submit" class="btn">

<!-- JQUERY -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- SELECT2 -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

$(document).ready(function(){

    $('#estudiante').select2({
        placeholder: "Buscar estudiante...",
        allowClear: true,
        width:'100%'
    });

});

function calcularPago(){

    let licencia = document.getElementById("licencia");

    let valorCurso = licencia.options[
        licencia.selectedIndex
    ].getAttribute("data-valor");

    valorCurso = parseFloat(valorCurso || 0);

    let matricula = parseFloat(
        document.getElementById("matricula").value || 0
    );

    let descuento = parseFloat(
        document.getElementById("descuento").value || 0
    );

    let subtotal = valorCurso + matricula;

    let valorDescuento = subtotal * (descuento / 100);

    let total = subtotal - valorDescuento;

    document.getElementById("valorCurso").innerText =
        valorCurso.toFixed(2);

    document.getElementById("valorMatricula").innerText =
        matricula.toFixed(2);

    document.getElementById("valorDescuento").innerText =
        valorDescuento.toFixed(2);

    document.getElementById("total").innerText =
        total.toFixed(2);

    document.getElementById("totalInput").value =
        total.toFixed(2);
}

// CALCULAR AL CARGAR
calcularPago();

</script>
